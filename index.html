<!doctype html>
<html lang="sk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Maľovanky – Jar</title>
  <meta name="description" content="Interaktívna omaľovánka pre deti — jarné motívy">
  <meta name="theme-color" content="#085475">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ══════════════════════════════════════════════════════════
     GALLERY VIEW
══════════════════════════════════════════════════════════ -->
<div id="view-gallery">
  <header class="toolbar">
    <div class="toolbar__left">
      <img src="assets/logo-edualf-light.svg" alt="eduAlf" class="toolbar__logo">
    </div>
    <div class="toolbar__center">MAĽOVANKY – JAR</div>
    <div class="toolbar__right">
      <button class="icon-btn desktop-only" id="gallery-fullscreen" aria-label="Celá obrazovka">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 3 21 3 21 9"></polyline><polyline points="9 21 3 21 3 15"></polyline>
          <line x1="21" y1="3" x2="14" y2="10"></line><line x1="3" y1="21" x2="10" y2="14"></line>
        </svg>
      </button>
    </div>
  </header>
  <main class="gallery">
    <p class="gallery__sub">Vyber omaľovánku a začni maľovať</p>
    <div class="gallery__grid" id="gallery-grid"></div>
  </main>
</div>

<!-- ══════════════════════════════════════════════════════════
     COLORING VIEW
══════════════════════════════════════════════════════════ -->
<div id="view-coloring" class="hidden">

  <!-- Toolbar -->
  <header class="toolbar">
    <div class="mobile-only" style="flex:0 0 auto">
      <button class="icon-btn icon-btn--danger" id="btn-close-m" aria-label="Zatvoriť" style="pointer-events:none;opacity:0.45;cursor:default">
        <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M8 8l16 16M24 8L8 24"/></svg>
      </button>
    </div>
    <div class="toolbar__left desktop-only">
      <img src="assets/logo-edualf-light.svg" alt="eduAlf" class="toolbar__logo">
    </div>
    <div class="toolbar__center">MAĽOVANKY – JAR</div>
    <div class="toolbar__right">
      <button class="icon-btn" id="btn-fullscreen" aria-label="Celá obrazovka" style="pointer-events:none;opacity:0.45;cursor:default">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 3 21 3 21 9"></polyline><polyline points="9 21 3 21 3 15"></polyline>
          <line x1="21" y1="3" x2="14" y2="10"></line><line x1="3" y1="21" x2="10" y2="14"></line>
        </svg>
      </button>
      <button class="icon-btn icon-btn--danger desktop-only" id="btn-close" aria-label="Zatvoriť" style="pointer-events:none;opacity:0.45;cursor:default">
        <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M8 8l16 16M24 8L8 24"/></svg>
      </button>
    </div>
  </header>

  <!-- Body -->
  <div class="coloring-body">

    <!-- LEFT: tool rail -->
    <aside class="tool-rail" id="tool-rail">

      <!-- TOP GROUP: thickness pills -->
      <div class="btn-group">
        <button class="tool-btn thickness-pill" id="thick-0" data-thickness="0" aria-label="Tenký štetec" title="Tenký">
          <span class="dot" style="width:5px;height:5px"></span>
        </button>
        <button class="tool-btn thickness-pill tool-btn--active" id="thick-1" data-thickness="1" aria-label="Stredný štetec" title="Stredný">
          <span class="dot" style="width:11px;height:11px"></span>
        </button>
        <button class="tool-btn thickness-pill" id="thick-2" data-thickness="2" aria-label="Hrubý štetec" title="Hrubý">
          <span class="dot" style="width:18px;height:18px"></span>
        </button>
      </div>

      <div class="rail-sep"></div>

      <!-- BOTTOM GROUP: tools -->
      <div class="btn-group">
        <button class="tool-btn" id="tool-eraser" aria-label="Guma" title="Guma (E)">
          <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 4l9 9-13 13H8l-4-4v-3L19 4z"/>
            <path d="M13 10l9 9"/>
          </svg>
        </button>
        <button class="tool-btn" id="tool-brush" aria-label="Štetec" title="Štetec (B)">
          <svg viewBox="0 0 512 512" fill="currentColor">
            <path d="M510.2 7.2c9.2 9.2-17 53.2-78.8 132.1s-113.6 138.8-155.5 180c-13.5 13.5-35.5 31.9-66 55.4-2.8 2.1-5.7.7-8.5-4.3-6.4-12.1-14.9-23.4-25.6-34.1-11.4-11.4-23.1-19.9-35.1-25.6-5.7-2.1-7.1-5-4.3-8.5 22.7-29.8 41.2-51.5 55.4-65C233.7 196 294.7 145.1 375 84.4S500.3-2 510.2 7.2z"/>
            <path d="M62.9 351.2c13.5-12.1 28.6-17.2 45.3-15.4s32.1 9.8 46.3 24c14.9 14.2 23.4 29.6 25.6 46.3s-3.2 31.4-16 44.2c-30.5 29.8-71 47.9-121.4 54.3Q-2 511.05.1 497.1c0-1.4 1.1-3.2 3.2-5.3 18.5-21.3 29.8-47 34.1-77.2s12.7-51.3 25.5-63.4z"/>
          </svg>
        </button>
        <button class="tool-btn tool-btn--active" id="tool-bucket" aria-label="Vedierko" title="Vedierko (V)">
          <svg viewBox="0 0 122.88 112.71" fill="currentColor" style="display:block;transform:scaleX(-1)">
            <path d="M6.56,52C33.11,57.3,43.18,89.47,86.29,67.8L58,96.06s-.57.58-.63.65a7,7,0,0,1-4.29,2.56,13.6,13.6,0,0,1-4.2.24h0a21.48,21.48,0,0,1-4.8-1.06c-7.4-2.48-15.17-7.8-21.79-14.37S10.22,69.62,7.61,62.19a25.29,25.29,0,0,1-1-3.74,17.9,17.9,0,0,1-.33-3.3A12.86,12.86,0,0,1,6.56,52Z"/>
            <path d="M111.24,72.76c.82,3.48,3.17,7.06,5.43,10.5,3.35,5.1,6.52,9.93,6.18,15.51l0,.22a14.76,14.76,0,0,1-10,12.68,17.35,17.35,0,0,1-6.85,1,17,17,0,0,1-6.73-1.76A14.85,14.85,0,0,1,91,97c0-3.86,2.79-8.22,5.83-13,2.46-3.84,5.11-8,5.86-11.25a4.41,4.41,0,0,1,8.59,0Z"/>
            <path d="M110.56,84.94c-1.21-1.85-2.44-3.72-3.61-5.64-1.35,2.26-2.77,4.48-4.15,6.64-3.51,5.48-6.72,10.51-6.72,12.55,0,4.65,2.24,7.71,5.23,9.21a12.56,12.56,0,0,0,4.94,1.25,13,13,0,0,0,5.16-.74,9.49,9.49,0,0,0,6.36-8c.13-4.1-3.44-9.53-7.21-15.27Z"/>
            <path d="M107,73.76c2.15,9.2,12,17.11,11.5,24.75-1.49,13.54-23.07,13-23.07-1.51,0-5.18,9.72-15.25,11.57-23.24Z"/>
            <path fill-rule="evenodd" d="M34.65,13.77c-10.22,1.1-16.22,4.63-19,9.11a13.37,13.37,0,0,0-1.23,10.65l.09.34,20.11-20.1ZM80.8,24.89c-7.29-7.3-14.66-13-20.73-16.17C55.76,6.5,52.4,5.61,50.75,6.55l-.82.82c-1.22,2-.51,6.26,1.78,11.58A68.81,68.81,0,0,0,66.22,39.47c6.94,6.94,14.39,12.14,20.73,15,4.51,2,8.21,2.9,10.35,2.32l1.91-1.92c.45-1.91-.5-5.14-2.49-9.13C93.63,39.53,88,32.08,80.8,24.89ZM62.94,3.15c6.66,3.43,14.58,9.57,22.31,17.3S99,36.15,102.34,43c3.75,7.51,4.35,13.92.69,17.58A8.23,8.23,0,0,1,101,62L61.88,101.1c-2.35,2.37-3.33,3.37-7.38,4.28a19.93,19.93,0,0,1-6.14.36,27.5,27.5,0,0,1-6.24-1.35c-8.33-2.8-17-8.66-24.22-15.86S4.63,72.6,1.7,64.25A30.28,30.28,0,0,1,.43,59.6,23.6,23.6,0,0,1,0,55.15a15.25,15.25,0,0,1,1.23-6.81A17.84,17.84,0,0,1,5,43.42l.16-.17,4.71-4.7A24.06,24.06,0,0,1,8.65,35.1a19.15,19.15,0,0,1,1.92-15.34C14.84,12.78,24.42,7.59,41,7.42l4.17-4.16a7.06,7.06,0,0,1,1.58-1.57,2.46,2.46,0,0,1,.67-.45C51.13-1,56.62-.11,62.94,3.15ZM91.48,62.61a35.83,35.83,0,0,1-7.11-2.42c-7-3.16-15.11-8.81-22.59-16.28A75.25,75.25,0,0,1,45.94,21.43a34.92,34.92,0,0,1-2.39-7.68L17.44,39.85a25.47,25.47,0,0,0,4.1,4.58c7.26,6.43,18.87,9.69,31.64,4.22a3,3,0,0,1,2.35,5.52c-15.21,6.51-29.17,2.52-38-5.25a32,32,0,0,1-4.42-4.78L9.44,47.85A12.66,12.66,0,0,0,6.9,51a9.73,9.73,0,0,0-.64,4.14,17.9,17.9,0,0,0,.33,3.3,25.29,25.29,0,0,0,1,3.74c2.61,7.43,8,15.27,14.71,21.89S36.71,96,44.11,98.45a21.48,21.48,0,0,0,4.8,1.06h0a13.6,13.6,0,0,0,4.2-.24,7,7,0,0,0,4.29-2.56c.06-.07.64-.64.63-.65L91.48,62.61Z"/>
          </svg>
        </button>
      </div>

      <!-- MOBILE-ONLY extras -->
      <div class="rail-sep mobile-only"></div>
      <button class="tool-btn mobile-only" id="btn-sound-m" aria-label="Zvuk" title="Zvuk">
        <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 12h4l7-5v18l-7-5H6z"/><path d="M22 11a6 6 0 010 10"/><path d="M25 7a11 11 0 010 18"/>
        </svg>
      </button>
      <button class="tool-btn mobile-only" id="btn-gallery-m" aria-label="Galéria" title="Galéria">
        <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
          <rect x="3" y="5" width="10" height="10" rx="1.5"></rect>
          <rect x="17" y="5" width="12" height="10" rx="1.5"></rect>
          <rect x="3" y="18" width="12" height="9" rx="1.5"></rect>
          <rect x="19" y="18" width="10" height="9" rx="1.5"></rect>
        </svg>
      </button>
      <button class="tool-btn mobile-only" id="btn-print-m" aria-label="Tlačiť">
        <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <rect x="8" y="4" width="16" height="8" rx="1"></rect>
          <rect x="4" y="12" width="24" height="12" rx="2"></rect>
          <rect x="9" y="19" width="14" height="9" rx="1"></rect>
          <circle cx="24" cy="16" r="1.2" fill="currentColor" stroke="none"></circle>
        </svg>
      </button>
      <button class="tool-btn mobile-only" id="btn-save-m" aria-label="Uložiť">
        <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 4v18"/><path d="M10 16l6 6 6-6"/>
          <path d="M4 24v3a2 2 0 002 2h20a2 2 0 002-2v-3"/>
        </svg>
      </button>
      <button class="tool-btn mobile-only" id="btn-clear-m" aria-label="Vymazať všetko">
        <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 8h22"/><path d="M10 8V5a2 2 0 012-2h8a2 2 0 012 2v3"/>
          <path d="M7 8l2 19a2 2 0 002 2h10a2 2 0 002-2l2-19"/>
          <path d="M13 14v10M19 14v10"/>
        </svg>
      </button>
    </aside>

    <!-- CENTER: canvas -->
    <main class="canvas-area">
      <div class="svg-wrap" id="svg-wrap">
        <div class="svg-loading" id="svg-loading-indicator">
          <div class="svg-loading__spinner"></div>
          <span>Načítavam…</span>
        </div>
        <!-- canvas overlay for brush drawing -->
        <canvas id="draw-canvas"></canvas>
      </div>
    </main>

    <!-- RIGHT: action rail (desktop only) -->
    <aside class="action-rail desktop-only">

      <!-- TOP GROUP: output actions -->
      <div class="btn-group">
        <button class="tool-btn" id="btn-sound" aria-label="Zvuk" title="Zvuk">
          <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 12h4l7-5v18l-7-5H6z"/><path d="M22 11a6 6 0 010 10"/><path d="M25 7a11 11 0 010 18"/>
          </svg>
        </button>
        <button class="tool-btn" id="btn-print" aria-label="Tlačiť" title="Tlačiť">
          <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <rect x="8" y="4" width="16" height="8" rx="1"></rect>
            <rect x="4" y="12" width="24" height="12" rx="2"></rect>
            <rect x="9" y="19" width="14" height="9" rx="1"></rect>
            <circle cx="24" cy="16" r="1.2" fill="currentColor" stroke="none"></circle>
          </svg>
        </button>
        <button class="tool-btn" id="btn-save" aria-label="Uložiť ako PNG" title="Stiahnuť PNG">
          <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 4v18"/><path d="M10 16l6 6 6-6"/>
            <path d="M4 24v3a2 2 0 002 2h20a2 2 0 002-2v-3"/>
          </svg>
        </button>
      </div>

      <div class="rail-sep"></div>

      <!-- BOTTOM GROUP: management actions -->
      <div class="btn-group">
        <button class="tool-btn" id="btn-gallery" aria-label="Galéria" title="Späť do galérie">
          <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
            <rect x="3" y="5" width="10" height="10" rx="1.5"></rect>
            <rect x="17" y="5" width="12" height="10" rx="1.5"></rect>
            <rect x="3" y="18" width="12" height="9" rx="1.5"></rect>
            <rect x="19" y="18" width="10" height="9" rx="1.5"></rect>
          </svg>
        </button>
        <button class="tool-btn" id="btn-clear" aria-label="Vymazať všetko" title="Vymazať všetky farby">
          <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 8h22"/>
            <path d="M10 8V5a2 2 0 012-2h8a2 2 0 012 2v3"/>
            <path d="M7 8l2 19a2 2 0 002 2h10a2 2 0 002-2l2-19"/>
            <path d="M13 14v10M19 14v10"/>
          </svg>
        </button>
        <button class="tool-btn" id="tool-undo" aria-label="Späť" title="Späť (Ctrl+Z)" disabled>
          <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 12l-5-5 5-5"/>
            <path d="M4 7h15a8 8 0 010 16h-7"/>
          </svg>
        </button>
      </div>

    </aside>

    <!-- BOTTOM: palette -->
    <div class="palette-bar" id="palette-bar"></div>

  </div>
</div>

<!-- Confirm dialog -->
<div class="confirm-overlay hidden" id="confirm-overlay">
  <div class="confirm-box">
    <h3>Vymazať farby?</h3>
    <p>Všetky farby a kresby budú odstránené.<br>Túto akciu nemôžeš vrátiť späť.</p>
    <div class="confirm-box__btns">
      <button class="btn btn--ghost" id="confirm-cancel">Zrušiť</button>
      <button class="btn btn--danger" id="confirm-ok">Vymazať</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
